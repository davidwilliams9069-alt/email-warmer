<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Account Warmer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input[type="email"],
        input[type="password"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 120px;
            font-family: monospace;
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .log-container {
            margin-top: 30px;
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        
        .log-container.show {
            display: block;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #ddd;
            font-family: monospace;
            font-size: 14px;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .progress {
            margin-top: 20px;
            display: none;
        }
        
        .progress.show {
            display: block;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        
        .warning {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ffeaa7;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            display: none;
        }
        
        .stats.show {
            display: grid;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Gmail Account Warmer</h1>
        <p class="subtitle">Gradually build reputation for your new Gmail account</p>
        
        <div class="warning">
            ⚠️ <strong>Important:</strong> Use an App Password instead of your regular Gmail password. 
            Enable 2FA and generate it from Google Account settings.
        </div>
        
        <form id="warmerForm">
            <div class="form-group">
                <label>Gmail Address *</label>
                <input type="email" id="email" required placeholder="your.email@gmail.com">
            </div>
            
            <div class="form-group">
                <label>App Password *</label>
                <input type="password" id="password" required placeholder="16-character app password">
            </div>
            
            <div class="form-group">
                <label>Target Type *</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="targetType" value="single" checked> Single Recipient
                    </label>
                    <label>
                        <input type="radio" name="targetType" value="list"> Multiple Recipients (List)
                    </label>
                </div>
            </div>
            
            <div id="singleTargetGroup">
                <div class="form-group">
                    <label>Recipient Email *</label>
                    <input type="email" id="target" placeholder="recipient@example.com">
                </div>
                
                <div class="form-group">
                    <label>Number of Emails *</label>
                    <input type="number" id="count" min="1" max="10" value="3">
                    <small style="color: #666;">Start small (1-5 emails per day)</small>
                </div>
            </div>
            
            <div id="listTargetGroup" style="display: none;">
                <div class="form-group">
                    <label>Email List (one per line) *</label>
                    <textarea id="addresses" placeholder="friend1@example.com&#10;colleague@company.com&#10;partner@business.org"></textarea>
                </div>
            </div>
            
            <div class="form-group">
                <label>Content Mode *</label>
                <select id="mode">
                    <option value="template">📝 Templates (Recommended)</option>
                    <option value="ai">🤖 AI-Generated</option>
                    <option value="random">🎲 Random Text</option>
                </select>
            </div>
            
            <button type="submit" id="submitBtn">Start Warming</button>
        </form>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="successCount">0</div>
                <div class="stat-label">Successful</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="failedCount">0</div>
                <div class="stat-label">Failed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total</div>
            </div>
        </div>
        
        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        
        <div class="log-container" id="logContainer">
            <div id="logs"></div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('warmerForm');
        const submitBtn = document.getElementById('submitBtn');
        const logContainer = document.getElementById('logContainer');
        const logs = document.getElementById('logs');
        const stats = document.getElementById('stats');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progressFill');
        const successCount = document.getElementById('successCount');
        const failedCount = document.getElementById('failedCount');
        const totalCount = document.getElementById('totalCount');
        
        // Toggle between single and list target
        document.querySelectorAll('input[name="targetType"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'single') {
                    document.getElementById('singleTargetGroup').style.display = 'block';
                    document.getElementById('listTargetGroup').style.display = 'none';
                    document.getElementById('target').required = true;
                    document.getElementById('addresses').required = false;
                } else {
                    document.getElementById('singleTargetGroup').style.display = 'none';
                    document.getElementById('listTargetGroup').style.display = 'block';
                    document.getElementById('target').required = false;
                    document.getElementById('addresses').required = true;
                }
            });
        });
        
        function addLog(message) {
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.textContent = message;
            logs.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        function clearLogs() {
            logs.innerHTML = '';
        }
        
        function updateStats(success, failed) {
            successCount.textContent = success;
            failedCount.textContent = failed;
            totalCount.textContent = success + failed;
        }
        
        function updateProgress(current, total) {
            const percentage = (current / total) * 100;
            progressFill.style.width = percentage + '%';
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const targetType = document.querySelector('input[name="targetType"]:checked').value;
            const mode = document.getElementById('mode').value;
            
            let target = null;
            let count = null;
            let addresses = null;
            
            if (targetType === 'single') {
                target = document.getElementById('target').value;
                count = parseInt(document.getElementById('count').value);
                if (!target || count < 1) {
                    alert('Please fill in all required fields');
                    return;
                }
            } else {
                addresses = document.getElementById('addresses').value;
                if (!addresses.trim()) {
                    alert('Please enter at least one email address');
                    return;
                }
            }
            
            // Reset UI
            submitBtn.disabled = true;
            clearLogs();
            logContainer.classList.add('show');
            stats.classList.add('show');
            progress.classList.add('show');
            updateStats(0, 0);
            updateProgress(0, 1);
            
            addLog('Starting email warming process...');
            addLog(`Mode: ${mode}`);
            
            const payload = {
                email,
                password,
                target,
                count,
                addresses,
                mode
            };
            
            try {
                const response = await fetch('/api/warm', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                // Display logs
                result.logs.forEach(log => addLog(log));
                
                // Update stats
                updateStats(result.success, result.failed);
                updateProgress(result.success + result.failed, result.success + result.failed);
                
                addLog('✅ Process completed!');
                
            } catch (error) {
                addLog(`❌ Error: ${error.message}`);
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
